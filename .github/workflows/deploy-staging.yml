name: Deploy Theme to Staging

on:
  push:
    branches:
      - staging

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install & Build
        run: |
          npm install
          npm run build

      - name: Sync to CloudPanel
        uses: Burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: .
          remote_path: /home/${{ secrets.SSH_USER }}/htdocs/${{ secrets.SSH_DOMAIN }}/wp-content/themes/solaire-online-theme
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
          args: --exclude '.git*' --exclude 'node_modules' --exclude 'src'
